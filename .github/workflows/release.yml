name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      version:
        description: "Custom semver version (required when bump=custom), e.g. 0.2.0"
        required: false
        type: string

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create GitHub release
      id-token: write # needed for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump versions across packages
        if: github.event_name == 'workflow_dispatch'
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          bump_type="${{ inputs.bump }}"
          custom_version="${{ inputs.version }}"

          if [[ "$bump_type" == "custom" ]]; then
            if [[ -z "$custom_version" ]]; then
              echo "Input 'version' is required when bump=custom."
              exit 1
            fi
            target="$custom_version"
          else
            target="$bump_type"
          fi

          pnpm -r --filter './packages/**' exec -- pnpm version "$target" --no-git-tag-version
          version=$(node -p "require('./packages/core/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve version from tag
        if: github.event_name == 'push'
        id: from_tag
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Commit and push bumped versions
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.bump.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add packages/**/package.json
          git commit -m "chore(release): v$version"
          git tag "v$version"
          git push origin HEAD --follow-tags

      - name: Build all packages
        run: pnpm -r --filter='!@lexify/demo' --filter='!@lexify/e2e' --filter='!@lexify/test-utils' build

      - name: Verify packed manifests do not contain workspace deps
        shell: bash
        run: |
          set -euo pipefail

          out_dir="/tmp/lexify-pack"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"

          for pkg in packages/core packages/plugins packages/react packages/themes packages/ui; do
            pnpm --dir "$pkg" pack --pack-destination "$out_dir" > /dev/null
          done

          for tgz in "$out_dir"/*.tgz; do
            manifest=$(tar -xOf "$tgz" package/package.json)
            if echo "$manifest" | grep -q '"workspace:\*"'; then
              echo "Found workspace protocol in packed manifest: $tgz"
              echo "$manifest"
              exit 1
            fi
          done

          echo "Packed manifests look valid."

      # - name: Typecheck
      #   run: pnpm -r --filter='!@lexify/demo' --filter='!@lexify/e2e' typecheck

      # - name: Run tests
      #   run: pnpm -r --filter='!@lexify/demo' --filter='!@lexify/e2e' test

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm -r \
            --filter @lexify/core \
            --filter @lexify/plugins \
            --filter @lexify/react \
            --filter @lexify/themes \
            --filter @lexify/ui \
            publish \
            --access public \
            --no-git-checks \
            --report-summary

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version || steps.from_tag.outputs.version }}
          generate_release_notes: true
